name: "Publish Release"

on:
  push:
    tags:
      # Plain tags (e.g. v0.1.22) build PRODUCTION.
      # Tags suffixed with -staging (e.g. v0.1.22-staging) build STAGING.
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - production
          - staging
        default: production

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above)
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skip on linux and windows
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install

      - name: Resolve target environment
        id: env
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == *-staging ]]; then
            ENVIRONMENT="staging"
          else
            ENVIRONMENT="production"
          fi

          echo "Resolved environment: $ENVIRONMENT"

          if [ "$ENVIRONMENT" = "staging" ]; then
            {
              echo "api_url=https://api.stg.shettar.com"
              echo "app_env=staging"
              echo "tag_name=v__VERSION__-staging"
              echo "release_name=Shettar Business v__VERSION__ (staging)"
              echo "prerelease=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "api_url=https://api-v1.shettar.com"
              echo "app_env=production"
              echo "tag_name=v__VERSION__"
              echo "release_name=Shettar Business v__VERSION__"
              echo "prerelease=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # API URL + env are baked into the static Next.js export at build time.
          NEXT_PUBLIC_API_URL: ${{ steps.env.outputs.api_url }}
          NEXT_PUBLIC_APP_ENV: ${{ steps.env.outputs.app_env }}
        with:
          tagName: ${{ steps.env.outputs.tag_name }} # tauri-action replaces __VERSION__ with the app version
          releaseName: ${{ steps.env.outputs.release_name }}
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: true
          prerelease: ${{ steps.env.outputs.prerelease }}
          args: ${{ matrix.args }}
